version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, rust]

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: monthly
    labels: [dependencies, site]
